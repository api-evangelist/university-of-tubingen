  - date: '2026-06-03'
    rating: 2
    summary: >-
      No central developer portal or published API documentation hub was found.
      The verifiable, publicly documented API footprint is the FDAT
      institutional research data repository (InvenioRDM), which exposes a live
      JSON REST API and an OAI-PMH 2.0 endpoint, both returning HTTP 200 and
      confirmed live. Central systems referenced on the website (ALMA student
      information, ILIAS, Moodle, FIT research information system, TIMMS video
      portal) are gated and have no public API docs, so none were cataloged to
      avoid fabrication. Multiple verified GitHub organizations publish source
      code but not consumer-facing web APIs. Library catalog (Alma/Primo) and
      SSO endpoints were not confirmed to have public, documented APIs.
